services:
  mock-service:
    build:
      context: ../e2e/services
      dockerfile: Dockerfile
    environment:
      - PORT=4000
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/products"]
      interval: 2s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: ..
      dockerfile: e2e/Dockerfile
    working_dir: /app
    volumes:
      - ./config.yaml:/app/config/config.yaml:ro
    ports:
      - "8080:8080"
    depends_on:
      mock-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 2s
      timeout: 5s
      retries: 10
